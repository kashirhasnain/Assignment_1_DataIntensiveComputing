runners:
  hadoop:
    hadoop_streaming_jar: /usr/lib/hadoop/tools/lib/hadoop-streaming-3.3.6.jar

    jobconf:
      #  No wasted duplicate tasks 
      mapreduce.map.speculative: false
      mapreduce.reduce.speculative: false

      #  Map output compression 
      mapreduce.map.output.compress: true
      mapreduce.map.output.compress.codec: org.apache.hadoop.io.compress.SnappyCodec

      #  Sort buffer
      mapreduce.task.io.sort.mb: 512
      mapreduce.map.sort.spill.percent: "0.90"

      #  Shuffle — 27 nodes sending simultaneously 
      mapreduce.reduce.shuffle.parallelcopies: 27
      mapreduce.reduce.shuffle.input.buffer.percent: "0.70"
      mapreduce.reduce.shuffle.merge.percent: "0.66"

      #  Split size: 54GB / 64MB = ~864 parallel mappers 
      mapreduce.input.fileinputformat.split.maxsize: 67108864

      #  Step 1 reducers (27 nodes x 16 cores x 0.4) 
      # Step 2 overrides this to 1 via its own jobconf in steps()
      mapreduce.job.reduces: 160